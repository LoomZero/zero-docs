name: Zero Theme
description: Zero Theme
type: theme
core_version_requirement: 9.*
base theme: stable

# Regions
regions:
  header: 'Header'
  content: 'Content'
  footer: 'Footer'

# Remove stylesheets
stylesheets-remove:
  - core/modules/system/css/system.module.css
  - core/modules/system/css/system.theme.css
  - core/modules/views/css/views.module.css
  - core/assets/vendor/jquery.ui/themes/base/core.css
  - core/assets/vendor/jquery.ui/themes/base/theme.css
  - core/assets/vendor/jquery.ui/themes/base/accordion.css

stylesheets-override:
  - core/themes/stable/css/contextual/contextual.module.css

# Add built css and js files declared in libraries
component-libraries:
  components:
    paths:
    - gulp/src/components

libraries:
  - zero/base
